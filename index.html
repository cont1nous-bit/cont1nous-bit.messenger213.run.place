<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Важно для мобильных -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .container {
            max-width: 500px;
            padding: 40px 20px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 18px 40px;
            background: white;
            color: #764ba2;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Связь со мной</h1>
        <p>Нажми на кнопку ниже, чтобы написать мне в мессенджер</p>

         -->
        <a href="https://t.me/danilpolshin" class="btn">
            Открыть мессенджер
        </a>
    </div>
</body>
</html>
